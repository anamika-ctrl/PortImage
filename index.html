<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PortImage</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media', // Respects system dark mode
      theme: {
        extend: {
          colors: {
            purple: { 50: '#faf5ff', 100: '#f3e8ff', 300: '#d8b4fe', 400: '#c084fc', 500: '#a855f7', 600: '#9333ea', 700: '#7e22ce', 800: '#6b21a8', 900: '#581c87', }
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom Scrollbar & Print Styles */
    @media print {
      body { background: white; margin: 0; padding: 0; }
      #app-wrapper { display: block; box-shadow: none; background: white; }
      .print\:hidden { display: none !important; }
      .print\:p-0 { padding: 0 !important; }
      .print\:overflow-visible { overflow: visible !important; }
      .print\:max-w-none { max-width: none !important; }
      .print\:w-\[210mm\] { width: 210mm !important; }
      .print\:h-\[297mm\] { height: 297mm !important; }
      .print\:shadow-none { box-shadow: none !important; }
      .print\:rounded-none { border-radius: 0 !important; }
      .print\:border-gray-400 { border-color: #9ca3af !important; }
      .print\:border-transparent { border-color: transparent !important; }
      .print\:ring-0 { box-shadow: none !important; }
      @page { margin: 0cm; size: A4 portrait; }
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }
    @media (prefers-color-scheme: dark) {
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; }
    }
    
    /* Utility to hide elements smoothly */
    .modal-hidden {
      opacity: 0; pointer-events: none;
    }
    .modal-sheet-hidden {
      transform: translateY(100%);
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 font-sans text-gray-900 dark:text-gray-100 flex justify-center min-h-[100dvh] overflow-hidden">

  <!-- Main App Container -->
  <div id="app-wrapper" class="w-full max-w-md bg-white dark:bg-gray-950 shadow-2xl relative overflow-hidden flex flex-col h-[100dvh]">
    
    <!-- Hidden File Inputs -->
    <input type="file" id="file-input" accept="image/*" class="hidden" />
    <input type="file" id="add-file-input" accept="image/*" class="hidden" />

    <!-- ================= HOME SCREEN ================= -->
    <div id="view-home" class="flex-1 overflow-y-auto print:hidden pb-10 flex flex-col">
      <div class="pt-12 px-6 pb-6">
        <h1 class="text-4xl font-extrabold tracking-tight text-gray-900 dark:text-white">PortImage</h1>
        <p class="text-lg text-gray-500 dark:text-gray-400 mt-1 font-medium">Instant. Easy. Free.</p>
      </div>

      <div class="px-6 flex gap-4">
        <button id="btn-home-edit" class="flex-1 aspect-square bg-gray-50 dark:bg-gray-800 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-4 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="w-16 h-16 rounded-full bg-white dark:bg-gray-700 flex items-center justify-center shadow-sm">
            <i data-lucide="edit-3" class="w-8 h-8 text-gray-800 dark:text-white"></i>
          </div>
          <span class="font-semibold text-lg">Edit</span>
        </button>

        <button id="btn-home-print" class="flex-1 aspect-square bg-gray-50 dark:bg-gray-800 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-4 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors shadow-sm border border-gray-100 dark:border-gray-800">
          <div class="w-16 h-16 rounded-full bg-white dark:bg-gray-700 flex items-center justify-center shadow-sm">
            <i data-lucide="printer" class="w-8 h-8 text-gray-800 dark:text-white"></i>
          </div>
          <span class="font-semibold text-lg">Print</span>
        </button>
      </div>

      <div class="mt-10">
        <div class="px-6 flex items-center justify-between mb-4">
          <h2 class="text-xl font-bold">Recent Edits</h2>
          <span class="text-sm font-medium text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/30 px-3 py-1 rounded-full">99</span>
        </div>
        <div id="recent-edits-container" class="flex overflow-x-auto gap-4 px-6 pb-4 custom-scrollbar snap-x">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="mt-6 px-6">
        <h2 class="text-xl font-bold mb-4">How it Works</h2>
        <div class="relative w-full h-48 bg-gradient-to-br from-purple-100 to-indigo-50 dark:from-gray-800 dark:to-gray-800 rounded-3xl overflow-hidden group cursor-pointer border border-gray-100 dark:border-gray-700">
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-16 h-16 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center group-hover:scale-110 transition-transform shadow-lg text-purple-600">
              <i data-lucide="play-circle" class="w-10 h-10"></i>
            </div>
          </div>
        </div>
      </div>
    </div>


    <!-- ================= EDITOR SCREEN ================= -->
    <div id="view-editor" class="flex-1 hidden flex-col h-full bg-gray-100 dark:bg-gray-950 overflow-hidden relative">
      
      <!-- Top Navbar -->
      <div class="print:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm z-10 shrink-0">
        <button id="btn-editor-back" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition">
          <i data-lucide="chevron-left" class="w-6 h-6"></i>
        </button>
        <span class="font-bold text-lg truncate px-2">Print Image</span>
        <div class="flex items-center gap-2">
          <button id="btn-undo" disabled class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition disabled:opacity-30 disabled:cursor-not-allowed text-gray-700 dark:text-gray-300" title="Undo">
            <i data-lucide="undo" class="w-5 h-5"></i>
          </button>
          <button id="btn-export-pdf" class="bg-purple-600 text-white px-4 py-2 rounded-xl font-bold shadow-md hover:bg-purple-700 active:scale-95 transition-all text-sm flex items-center gap-2 disabled:opacity-70">
            <span id="export-text-idle" class="flex items-center gap-2"><i data-lucide="share" class="w-4 h-4"></i> Export</span>
            <span id="export-text-saving" class="hidden animate-pulse">Saving...</span>
          </button>
        </div>
      </div>

      <!-- Main Preview Area -->
      <div class="flex-1 overflow-y-auto py-6 px-4 flex flex-col items-center justify-start print:p-0 print:overflow-visible relative">
        
        <button id="btn-add-photo" class="print:hidden absolute top-8 right-6 z-20 bg-white dark:bg-gray-800 text-purple-600 dark:text-purple-400 p-3 rounded-full shadow-lg border border-purple-100 dark:border-purple-900 active:scale-95 transition-transform" title="Add photo to empty space">
          <i data-lucide="plus-circle" class="w-6 h-6"></i>
        </button>

        <!-- A4 Workspace -->
        <div id="a4-workspace" class="w-full max-w-[340px] aspect-[210/297] print:max-w-none print:w-[210mm] print:h-[297mm] bg-white shadow-md print:shadow-none relative mx-auto shrink-0 overflow-hidden">
          <div id="safe-area-indicator" class="absolute inset-[3%] border border-dashed border-gray-300 dark:border-gray-200 print:hidden pointer-events-none z-0 flex items-center justify-center">
            <span class="text-gray-400 text-sm font-medium">Safe Print Area</span>
          </div>
          <!-- Photos injected here -->
        </div>
      </div>

      <!-- Bottom Controls -->
      <div id="bottom-controls" class="hidden print:hidden bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-6 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-10 pb-8 shrink-0">
        <div class="flex items-center justify-between mb-4 px-2">
          <p class="font-bold text-gray-700 dark:text-gray-300">Crop & Adjust</p>
          <button id="btn-delete" class="flex items-center gap-1.5 text-red-500 bg-red-50 dark:bg-red-900/20 px-3 py-1.5 rounded-xl text-sm font-semibold hover:bg-red-100 dark:hover:bg-red-900/40 active:scale-95 transition-all">
            <i data-lucide="trash-2" class="w-4 h-4"></i> Delete
          </button>
        </div>
        
        <div class="flex items-center justify-between px-2">
          <div class="flex flex-col gap-3">
            <button id="btn-zoom-in" class="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
              <i data-lucide="zoom-in" class="w-6 h-6 text-purple-600 dark:text-purple-400"></i>
            </button>
            <button id="btn-zoom-out" class="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 border border-purple-100 dark:border-purple-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
              <i data-lucide="zoom-out" class="w-6 h-6 text-purple-600 dark:text-purple-400"></i>
            </button>
          </div>

          <div class="flex items-center justify-center gap-3">
            <button id="btn-move-left" class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
              <i data-lucide="arrow-left" class="w-6 h-6 text-gray-700 dark:text-gray-300"></i>
            </button>
            <div class="flex flex-col gap-3">
              <button id="btn-move-up" class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
                <i data-lucide="arrow-up" class="w-6 h-6 text-gray-700 dark:text-gray-300"></i>
              </button>
              <button id="btn-move-down" class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
                <i data-lucide="arrow-down" class="w-6 h-6 text-gray-700 dark:text-gray-300"></i>
              </button>
            </div>
            <button id="btn-move-right" class="w-12 h-12 bg-gray-100 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-sm active:scale-90 transition-transform">
              <i data-lucide="arrow-right" class="w-6 h-6 text-gray-700 dark:text-gray-300"></i>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ================= MODAL (BOTTOM SHEET) ================= -->
    <div id="modal-backdrop" class="fixed inset-0 z-50 flex items-end justify-center transition-opacity duration-300 modal-hidden">
      <div id="modal-overlay-click" class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
      
      <div id="modal-content" class="relative w-full max-w-md bg-white dark:bg-gray-900 rounded-t-[2rem] p-6 shadow-2xl transition-transform duration-500 ease-out flex flex-col modal-sheet-hidden">
        <div class="w-12 h-1.5 bg-gray-200 dark:bg-gray-700 rounded-full mx-auto mb-4"></div>
        <h2 id="modal-title" class="text-xl font-bold text-center mb-6">Print Settings</h2>

        <!-- Quantity Selector -->
        <div id="qty-selector" class="flex items-center justify-between bg-gray-50 dark:bg-gray-800 p-4 rounded-2xl mb-4">
          <span class="font-semibold text-gray-700 dark:text-gray-200">Number of copy</span>
          <div class="flex items-center gap-4">
            <button id="btn-qty-minus" class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow-sm border border-gray-100 dark:border-gray-600 active:scale-95 transition-transform">
              <i data-lucide="minus" class="w-5 h-5"></i>
            </button>
            <span id="qty-display" class="w-6 text-center font-bold text-lg">2</span>
            <button id="btn-qty-plus" class="w-10 h-10 flex items-center justify-center rounded-full bg-white dark:bg-gray-700 shadow-sm border border-gray-100 dark:border-gray-600 active:scale-95 transition-transform">
              <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Size Dropdown -->
        <div class="bg-gray-50 dark:bg-gray-800 rounded-2xl overflow-hidden transition-all duration-300 border border-gray-100 dark:border-gray-700">
          <button id="btn-dropdown-toggle" class="w-full flex items-center justify-between p-4 bg-transparent outline-none">
            <div class="flex flex-col items-start">
              <span class="font-semibold text-gray-700 dark:text-gray-200">Size</span>
              <span id="selected-size-text" class="text-sm text-purple-600 dark:text-purple-400 font-medium mt-0.5">India Passport (35x45 mm)</span>
            </div>
            <i id="dropdown-icon-down" data-lucide="chevron-down" class="w-5 h-5 text-gray-400 block"></i>
            <i id="dropdown-icon-up" data-lucide="chevron-up" class="w-5 h-5 text-gray-400 hidden"></i>
          </button>

          <div id="dropdown-menu" class="overflow-hidden transition-all duration-300 ease-in-out max-h-0">
            <div id="dropdown-list" class="px-2 pb-2 flex flex-col gap-1 overflow-y-auto max-h-60 custom-scrollbar">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4 mt-6">
          <button id="btn-modal-cancel" class="flex-1 py-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
            Cancel
          </button>
          <button id="btn-modal-continue" class="flex-1 py-4 rounded-2xl font-bold text-white bg-purple-600 hover:bg-purple-700 active:scale-[0.98] transition-all shadow-lg shadow-purple-600/30">
            Continue
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Logic (Vanilla JS) -->
  <script type="module">
    import html2canvas from 'https://esm.sh/html2canvas';
    import { jsPDF } from 'https://esm.sh/jspdf';

    // --- CONFIGURATION ---
    const A4_WIDTH_MM = 210;
    const A4_HEIGHT_MM = 297;

    const SIZES = [
      { id: 'in', name: 'India Passport (35x45 mm)', w: 35, h: 45 },
      { id: 'us', name: 'US Visa / Passport (51x51 mm)', w: 51, h: 51 },
      { id: 'eu', name: 'Schengen Visa (35x45 mm)', w: 35, h: 45 },
      { id: 'ca', name: 'Canada Visa (50x70 mm)', w: 50, h: 70 },
      { id: 'uk', name: 'UK Passport (35x45 mm)', w: 35, h: 45 },
      { id: 'li', name: 'LinkedIn/Profile Style', w: 51, h: 51 },
    ];

    // --- STATE ---
    let state = {
      view: 'home',
      modalMode: null, // 'print' | 'add' | null
      copies: 2,
      selectedSize: SIZES[0],
      isDropdownOpen: false,
      photos: [],
      history: [],
      activePhotoId: null,
      isExporting: false
    };

    // DOM Elements
    const viewHome = document.getElementById('view-home');
    const viewEditor = document.getElementById('view-editor');
    const fileInput = document.getElementById('file-input');
    const addFileInput = document.getElementById('add-file-input');
    const a4Workspace = document.getElementById('a4-workspace');
    const safeAreaIndicator = document.getElementById('safe-area-indicator');
    const bottomControls = document.getElementById('bottom-controls');

    // Setup function
    function init() {
      lucide.createIcons();
      renderRecentEditsMocks();
      renderDropdown();
      setupEventListeners();
    }

    // --- HISTORY / UNDO LOGIC ---
    function saveHistory() {
      state.history.push(JSON.parse(JSON.stringify(state.photos)));
      if (state.history.length > 20) state.history.shift(); // keep max 20 states
      updateUndoButton();
    }

    function updateUndoButton() {
      const btn = document.getElementById('btn-undo');
      if (btn) btn.disabled = state.history.length === 0;
    }

    function undo() {
      if (state.history.length === 0) return;
      state.photos = state.history.pop();
      
      // Clear active photo if it was deleted during undo
      if (!state.photos.find(p => p.id === state.activePhotoId)) {
        state.activePhotoId = null;
      }
      
      renderWorkspace();
      updateUndoButton();
    }


    // --- RENDER LOGIC ---

    function switchView(newView) {
      state.view = newView;
      if (newView === 'home') {
        viewHome.classList.remove('hidden');
        viewEditor.classList.add('hidden');
        viewHome.classList.add('flex');
        viewEditor.classList.remove('flex');
      } else {
        viewHome.classList.add('hidden');
        viewEditor.classList.remove('hidden');
        viewHome.classList.remove('flex');
        viewEditor.classList.add('flex');
        renderWorkspace();
      }
    }

    function openModal(mode) {
      state.modalMode = mode;
      document.getElementById('modal-title').innerText = mode === 'add' ? 'Add More Photos' : 'Print Settings';
      document.getElementById('qty-selector').style.display = mode === 'add' ? 'none' : 'flex';
      
      const backdrop = document.getElementById('modal-backdrop');
      const content = document.getElementById('modal-content');
      
      backdrop.classList.remove('modal-hidden');
      backdrop.classList.remove('opacity-0');
      backdrop.classList.add('opacity-100');
      
      content.classList.remove('modal-sheet-hidden');
      content.classList.remove('translate-y-full');
      content.classList.add('translate-y-0');
    }

    function closeModal() {
      state.modalMode = null;
      const backdrop = document.getElementById('modal-backdrop');
      const content = document.getElementById('modal-content');
      
      backdrop.classList.remove('opacity-100');
      backdrop.classList.add('opacity-0');
      
      content.classList.remove('translate-y-0');
      content.classList.add('translate-y-full');
      
      setTimeout(() => {
        backdrop.classList.add('modal-hidden');
        content.classList.add('modal-sheet-hidden');
      }, 300);
    }

    function renderDropdown() {
      const list = document.getElementById('dropdown-list');
      list.innerHTML = '';
      
      SIZES.forEach(size => {
        const isSelected = state.selectedSize.id === size.id;
        const btn = document.createElement('button');
        btn.className = `flex items-center justify-between w-full p-3 rounded-xl text-left transition-colors ${
          isSelected 
            ? 'bg-purple-100 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300' 
            : 'hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300'
        }`;
        
        let checkIconHTML = isSelected 
          ? `<i data-lucide="check-circle-2" class="w-5 h-5 text-purple-600 dark:text-purple-400"></i>` 
          : '';

        btn.innerHTML = `<span class="font-medium text-sm">${size.name}</span>${checkIconHTML}`;
        
        btn.onclick = () => {
          state.selectedSize = size;
          document.getElementById('selected-size-text').innerText = size.name;
          toggleDropdown(false);
          renderDropdown(); // re-render selection highlights
        };
        list.appendChild(btn);
      });
      lucide.createIcons();
    }

    function toggleDropdown(forceState) {
      state.isDropdownOpen = typeof forceState === 'boolean' ? forceState : !state.isDropdownOpen;
      
      const menu = document.getElementById('dropdown-menu');
      const iconDown = document.getElementById('dropdown-icon-down');
      const iconUp = document.getElementById('dropdown-icon-up');
      const sizeText = document.getElementById('selected-size-text');

      if (state.isDropdownOpen) {
        menu.classList.remove('max-h-0');
        menu.classList.add('max-h-80');
        iconDown.classList.add('hidden');
        iconDown.classList.remove('block');
        iconUp.classList.remove('hidden');
        iconUp.classList.add('block');
        sizeText.classList.add('opacity-0');
      } else {
        menu.classList.remove('max-h-80');
        menu.classList.add('max-h-0');
        iconDown.classList.remove('hidden');
        iconDown.classList.add('block');
        iconUp.classList.add('hidden');
        iconUp.classList.remove('block');
        setTimeout(() => sizeText.classList.remove('opacity-0'), 150);
      }
    }

    function renderRecentEditsMocks() {
      const container = document.getElementById('recent-edits-container');
      const mocks = Array(4).fill(null).map((_, i) => ({
        id: i, date: '9:41', color: `hsl(${i * 60 + 200}, 70%, 85%)`
      }));

      mocks.forEach(item => {
        const div = document.createElement('div');
        div.className = 'snap-start flex-shrink-0 w-28 flex flex-col gap-2';
        div.innerHTML = `
          <div class="w-28 h-36 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 flex items-center justify-center" style="background-color: ${item.color}">
            <i data-lucide="image" class="w-8 h-8 text-white/50"></i>
          </div>
          <span class="text-xs text-center text-gray-500 font-medium">${item.date}</span>
        `;
        container.appendChild(div);
      });
    }

    // --- WORKSPACE & EDITOR LOGIC ---

    function createPhotoNodes(imgSrc, numCopies, size) {
      const newPhotos = [];
      const cols = Math.floor(A4_WIDTH_MM / (size.w + 5)); 
      const batchId = crypto.randomUUID();
      
      for (let i = 0; i < numCopies; i++) {
        const count = state.photos.length + i;
        const row = Math.floor(count / cols);
        const col = count % cols;
        
        const baseX = 5 + (col * (size.w + 5));
        const baseY = 5 + (row * (size.h + 5));
        
        const pctX = (baseX / A4_WIDTH_MM) * 100;
        const pctY = (baseY / A4_HEIGHT_MM) * 100;
        
        newPhotos.push({
          id: crypto.randomUUID(),
          batchId,
          src: imgSrc,
          sizeId: size.id,
          w: size.w,
          h: size.h,
          x: Math.min(pctX, 100 - (size.w/A4_WIDTH_MM)*100), 
          y: Math.min(pctY, 100 - (size.h/A4_HEIGHT_MM)*100),
          innerX: 0,
          innerY: 0,
          zoom: 1
        });
      }
      return newPhotos;
    }

    function renderWorkspace() {
      // Clear existing photos
      Array.from(a4Workspace.children).forEach(child => {
        if (child.id !== 'safe-area-indicator') a4Workspace.removeChild(child);
      });

      safeAreaIndicator.style.display = state.photos.length === 0 ? 'flex' : 'none';

      state.photos.forEach(photo => {
        const div = document.createElement('div');
        div.id = `photo-${photo.id}`;
        
        const widthPct = (photo.w / A4_WIDTH_MM) * 100;
        const heightPct = (photo.h / A4_HEIGHT_MM) * 100;
        
        div.style.left = `${photo.x}%`;
        div.style.top = `${photo.y}%`;
        div.style.width = `${widthPct}%`;
        div.style.height = `${heightPct}%`;
        
        const img = document.createElement('img');
        img.id = `img-${photo.id}`;
        img.src = photo.src;
        img.alt = "Passport segment";
        img.className = "absolute max-w-none pointer-events-none object-cover min-w-full min-h-full";
        img.style.left = '50%';
        img.style.top = '50%';
        
        div.appendChild(img);
        a4Workspace.appendChild(div);

        // Update classes and styles directly
        updatePhotoDOM(photo.id);
        setupInteraction(div, photo.id);
      });

      updateControlsVisibility();
    }

    function updatePhotoDOM(photoId) {
      const p = state.photos.find(x => x.id === photoId);
      if (!p) return;
      
      const div = document.getElementById(`photo-${p.id}`);
      const img = document.getElementById(`img-${p.id}`);
      if (!div || !img) return;

      const isActive = state.activePhotoId === p.id;
      div.className = `absolute cursor-move touch-none overflow-hidden bg-gray-200 z-10 transition-[box-shadow,border] duration-150 ${
        isActive ? 'ring-2 ring-purple-500 shadow-xl z-20 print:ring-0 print:shadow-none' : 'shadow-sm border border-gray-300 print:border-transparent'
      }`;
      
      div.style.left = `${p.x}%`;
      div.style.top = `${p.y}%`;
      img.style.transform = `translate(calc(-50% + ${p.innerX}px), calc(-50% + ${p.innerY}px)) scale(${p.zoom})`;
    }

    function updateControlsVisibility() {
      if (state.activePhotoId) {
        bottomControls.classList.remove('hidden');
      } else {
        bottomControls.classList.add('hidden');
      }
    }

    function setActivePhoto(id) {
      const prevActive = state.activePhotoId;
      state.activePhotoId = id;
      if (prevActive) updatePhotoDOM(prevActive);
      if (id) updatePhotoDOM(id);
      updateControlsVisibility();
    }

    function updateBatch(batchId, updateFn) {
      state.photos.forEach(p => {
        if (p.batchId === batchId) {
          Object.assign(p, updateFn(p));
          updatePhotoDOM(p.id);
        }
      });
    }

    // --- DRAG & PINCH LOGIC ---

    function setupInteraction(div, photoId) {
      let isDragging = false;
      let dragStart = { x: 0, y: 0 };
      let initialPinchDist = null;
      let initialZoom = 1;
      let actionHistorySaved = false; // Used to save state once per action

      const getPhoto = () => state.photos.find(p => p.id === photoId);

      // TOUCH
      div.addEventListener('touchstart', (e) => {
        actionHistorySaved = false;
        setActivePhoto(photoId);
        if (e.touches.length === 2) {
          e.preventDefault();
          initialPinchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          initialZoom = getPhoto().zoom;
        } else if (e.touches.length === 1) {
          isDragging = true;
          dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
      }, { passive: false });

      div.addEventListener('touchmove', (e) => {
        const photo = getPhoto();
        if (!photo) return;

        if (e.touches.length === 2 && initialPinchDist) {
          e.preventDefault();
          if (!actionHistorySaved) { saveHistory(); actionHistorySaved = true; }
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const scale = dist / initialPinchDist;
          const newZoom = Math.max(1, Math.min(3, initialZoom * scale));
          updateBatch(photo.batchId, () => ({ zoom: newZoom }));
        } else if (e.touches.length === 1 && isDragging) {
          if (!actionHistorySaved) { saveHistory(); actionHistorySaved = true; }
          handleDragMove(e.touches[0].clientX, e.touches[0].clientY, photo);
        }
      }, { passive: false });

      div.addEventListener('touchend', () => {
        initialPinchDist = null;
        isDragging = false;
        const photo = getPhoto();
        if(photo) updateBatch(photo.batchId, () => ({})); 
      });

      // MOUSE
      div.addEventListener('mousedown', (e) => {
        e.preventDefault();
        actionHistorySaved = false;
        setActivePhoto(photoId);
        isDragging = true;
        dragStart = { x: e.clientX, y: e.clientY };

        const photo = getPhoto();
        
        state.photos.forEach(p => {
            if(p.batchId === photo.batchId) {
                const img = document.getElementById(`img-${p.id}`);
                if(img) img.style.transition = 'none';
            }
        });

        const onMouseMove = (ev) => {
          if (!actionHistorySaved) { saveHistory(); actionHistorySaved = true; }
          handleDragMove(ev.clientX, ev.clientY, getPhoto());
        };

        const onMouseUp = () => {
          isDragging = false;
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
          
          state.photos.forEach(p => {
              if(p.batchId === photo.batchId) {
                  const img = document.getElementById(`img-${p.id}`);
                  if(img) img.style.transition = 'transform 0.1s ease-out';
              }
          });
        };

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });

      function handleDragMove(clientX, clientY, photo) {
        if (!photo) return;
        const rect = a4Workspace.getBoundingClientRect();
        
        const deltaX = ((clientX - dragStart.x) / rect.width) * 100;
        const deltaY = ((clientY - dragStart.y) / rect.height) * 100;
        dragStart = { x: clientX, y: clientY };

        // Bounds check for the whole batch
        const batchPhotos = state.photos.filter(p => p.batchId === photo.batchId);
        let canMoveX = true;
        let canMoveY = true;
        
        batchPhotos.forEach(p => {
          const nx = p.x + deltaX;
          const ny = p.y + deltaY;
          const maxW = 100 - (p.w / A4_WIDTH_MM) * 100;
          const maxH = 100 - (p.h / A4_HEIGHT_MM) * 100;
          if (nx < 0 || nx > maxW) canMoveX = false;
          if (ny < 0 || ny > maxH) canMoveY = false;
        });

        updateBatch(photo.batchId, p => ({
          x: canMoveX ? p.x + deltaX : p.x,
          y: canMoveY ? p.y + deltaY : p.y
        }));
      }
    }


    // --- EVENTS ---
    function setupEventListeners() {
      
      // Undo button listener
      document.getElementById('btn-undo').addEventListener('click', undo);

      // Home interactions
      document.getElementById('btn-home-edit').addEventListener('click', () => fileInput.click());
      document.getElementById('btn-home-print').addEventListener('click', () => openModal('print'));
      
      // File Handlers
      const processUpload = (e, isAdding) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const imgSrc = event.target.result;
            const newNodes = createPhotoNodes(imgSrc, isAdding ? 1 : state.copies, state.selectedSize);
            
            if (isAdding) {
              saveHistory();
            } else {
              state.history = []; // reset history on brand new document upload
            }

            state.photos = isAdding ? [...state.photos, ...newNodes] : newNodes;
            setActivePhoto(newNodes[0].id);
            
            if (!isAdding) switchView('editor');
            closeModal();
            renderWorkspace();
            updateUndoButton();
          };
          reader.readAsDataURL(file);
        }
        e.target.value = '';
      };

      fileInput.addEventListener('change', (e) => processUpload(e, false));
      addFileInput.addEventListener('change', (e) => processUpload(e, true));

      // Modal Interactions
      document.getElementById('btn-dropdown-toggle').addEventListener('click', () => toggleDropdown());
      document.getElementById('modal-overlay-click').addEventListener('click', closeModal);
      document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
      
      document.getElementById('btn-qty-minus').addEventListener('click', () => {
        state.copies = Math.max(1, state.copies - 1);
        document.getElementById('qty-display').innerText = state.copies;
      });
      document.getElementById('btn-qty-plus').addEventListener('click', () => {
        state.copies = Math.min(20, state.copies + 1);
        document.getElementById('qty-display').innerText = state.copies;
      });

      document.getElementById('btn-modal-continue').addEventListener('click', () => {
        if (state.modalMode === 'add') {
          addFileInput.click();
        } else {
          if (state.photos.length === 0) {
            fileInput.click();
          } else {
            closeModal();
            switchView('editor');
          }
        }
      });

      // Editor interactions
      document.getElementById('btn-editor-back').addEventListener('click', () => switchView('home'));
      document.getElementById('btn-add-photo').addEventListener('click', () => openModal('add'));
      
      // Crop Controls
      const getActive = () => state.photos.find(p => p.id === state.activePhotoId);
      
      document.getElementById('btn-delete').addEventListener('click', () => {
        saveHistory();
        state.photos = state.photos.filter(p => p.id !== state.activePhotoId);
        setActivePhoto(null);
        renderWorkspace();
      });

      const moveInner = (dx, dy) => {
        const active = getActive();
        if(active) {
          saveHistory();
          updateBatch(active.batchId, p => ({ innerX: p.innerX + dx, innerY: p.innerY + dy }));
        }
      };
      
      const zoomInner = (dZoom) => {
        const active = getActive();
        if(active) {
          saveHistory();
          updateBatch(active.batchId, p => ({ zoom: Math.max(1, Math.min(3, p.zoom + dZoom)) }));
        }
      };

      document.getElementById('btn-move-left').addEventListener('click', () => moveInner(-10, 0));
      document.getElementById('btn-move-right').addEventListener('click', () => moveInner(10, 0));
      document.getElementById('btn-move-up').addEventListener('click', () => moveInner(0, -10));
      document.getElementById('btn-move-down').addEventListener('click', () => moveInner(0, 10));
      
      document.getElementById('btn-zoom-in').addEventListener('click', () => zoomInner(0.1));
      document.getElementById('btn-zoom-out').addEventListener('click', () => zoomInner(-0.1));

      // PDF Export logic
      const btnExport = document.getElementById('btn-export-pdf');
      const textIdle = document.getElementById('export-text-idle');
      const textSaving = document.getElementById('export-text-saving');

      btnExport.addEventListener('click', async () => {
        if(state.isExporting) return;
        state.isExporting = true;
        btnExport.disabled = true;
        textIdle.classList.add('hidden');
        textSaving.classList.remove('hidden');
        
        setActivePhoto(null); // Remove outlines

        try {
          // Allow DOM to update without borders
          await new Promise(resolve => setTimeout(resolve, 50)); 
          
          const canvas = await html2canvas(a4Workspace, { 
            scale: 3, 
            useCORS: true,
            backgroundColor: '#ffffff'
          });
          
          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297);
          const pdfBlob = pdf.output('blob');
          
          if (navigator.canShare) {
            const file = new File([pdfBlob], 'PortImage_Layout.pdf', { type: 'application/pdf' });
            try {
              await navigator.share({
                title: 'Print Passport Photos',
                text: 'Printing A4 Layout via PortImage',
                files: [file]
              });
            } catch (err) {
              console.log('Share canceled or failed', err);
            }
          } else {
            window.print();
          }
        } catch (err) {
          console.error('Export failed:', err);
          window.print(); 
        } finally {
          state.isExporting = false;
          btnExport.disabled = false;
          textIdle.classList.remove('hidden');
          textSaving.classList.add('hidden');
        }
      });

      // Global click handler to deselect photo if clicking empty space on canvas
      a4Workspace.addEventListener('mousedown', (e) => {
        if(e.target === a4Workspace || e.target === safeAreaIndicator) {
          setActivePhoto(null);
        }
      });
      a4Workspace.addEventListener('touchstart', (e) => {
        if(e.target === a4Workspace || e.target === safeAreaIndicator) {
          setActivePhoto(null);
        }
      });
    }

    // Initialize App
    document.addEventListener('DOMContentLoaded', init);

  </script>
</body>
